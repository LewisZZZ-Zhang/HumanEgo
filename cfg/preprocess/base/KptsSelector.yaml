# ==============================================================================
# Keypoints Selection Configuration (KptsSelector.yaml)
# ==============================================================================

# --- Mask Preprocessing (Noise Reduction & Hole Filling) ---
# These parameters clean the raw binary mask generated by upstream models (like SAM2)
# before attempting to find the geometric contour.

kpts_patch_close: true       # Toggle morphological closing. Fills internal holes/gaps inside the object mask.
                             # Highly recommended to keep 'true' to handle specular reflections or SAM2 artifacts.
kpts_close_kernel: 7         # Size of the elliptical closing kernel (must be an odd number).
                             # Increase if the mask has large internal holes; decrease if the object itself is very thin.

kpts_patch_erode: true       # Toggle morphological erosion. Removes jagged edges and tiny noise spikes on the boundary.
kpts_erode_kernel: 5         # Size of the elliptical erosion kernel (must be an odd number).
kpts_erode_iters: 1          # Number of times to apply the erosion operation.
                             # Increase iterations if the mask edges are extremely noisy or fuzzy.


# --- Inner Safety Margin (Edge Erosion) ---
# This step shrinks the mask slightly strictly for keypoint placement. 
# Placing tracking points slightly *inside* the object (rather than exactly on the background edge) 
# drastically improves the stability of downstream point trackers like CoTracker.

kpts_use_inner_edge: true    # Toggle inner safety margin erosion.
kpts_edge_erode_kernel: 5    # How far inward to push the tracking contour. Larger = deeper inside the object.
                             # Increase if tracking points keep drifting into the background. 
                             # Decrease if tracking small/thin objects where points might collapse to the center.
kpts_min_edge_pixels: 50     # Safety fallback area (in pixels). If the safety erosion shrinks the object 
                             # to fewer than this many pixels, the script automatically reverts to the 
                             # un-eroded mask to prevent losing the object entirely.


# --- Equidistant Contour Sampling ---
# Controls how many tracking keypoints are generated along the extracted contour.

kpts_n_bands: 10             # Base multiplier for the number of keypoints. 
                             # The script calculates Total Points = kpts_n_bands * 2. 
                             # E.g., setting this to 8 generates exactly 16 equidistant points.
                             # Increase for denser, more robust deformation tracking; 
                             # Decrease for faster computation and rigid objects.