# ---- Optimization & Schedule ----
epochs: 400
batch_size: 32
lr: 1.0e-4
weight_decay: 1.0e-2
grad_clip: 1.0
use_lr_schedule: true
warmup_steps: 200
min_lr_ratio: 0.05
use_amp: true

# ---- EMA ----
use_ema: true
ema_decay: 0.999

# ---- Model Hyperparams ----
num_inference_steps: 20
model_h_weighting: "uniform"
model_h_beta: 0.0
patch_size: 16
vision_embed_dim: 384
num_decoder_layers: 6
num_heads: 8
mlp_ratio: 4.0
dropout: 0.05

# ---- Evaluation ----
eval_every: 1
vis_eval_every: 100

# ---- Data & Task ----
task: "water_flowers"
job: "00_Baseline"
data_num: 100
num_workers: 8
enable_augmentation: true
enable_aug_img: true
enable_aug_rrc: true
enable_aug_jitter: true
enable_aug_cutout: true

# ---- Paradigm Ablations ----
pred_horizon: 50
img_name: "rgb_WoArm_WArmObjKpts.png"
image_size: [240, 320]
centric_mode: "object_centric"
frame_mode: "anchor_frame"
action_mode: "absolute"
max_state_tokens: 8
use_region_attn: true
use_ot_cfm: true


# ---- Loss Weights ----
w_flow: 3.0
w_pos: 5.0
w_rot: 2.0
w_g: 1.0
w_done: 0.5
use_aux_obj_dynamics: false

use_aux_visual_foresight: false
w_foresight: 10.0

use_aux_temporal_contrastive: false
w_contrastive: 0.1



