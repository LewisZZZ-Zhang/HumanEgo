# ============================================
# ACT — Teleop N=40 (ego-centric)
# ============================================

# ---- Data ----
pred_horizon: 50
image_size: [240, 320]
img_name: "rgb.png"
single_hand_side: "right"
hand_tracking_method: "aria_mps"
data_sources:
  teleop: 40
eval_source: "teleop"

# ---- Model ----
d_model: 256
nhead: 8
num_encoder_layers: 4
num_decoder_layers: 7
dim_feedforward: 2048
dropout: 0.1
action_dim: 10
latent_dim: 32
proprio_dim: 10

# ---- KL Schedule ----
# Original ACT (Zhao et al. 2023) uses kl_weight=10, constant.
# High constant KL immediately collapses the posterior, so the decoder
# learns to predict purely from observations (images + proprio) instead
# of "cheating" via the latent z.  Slow annealing (0→0.5) lets the
# decoder first rely on z then struggles to give it up → training stalls.
kl_weight_max: 10.0
kl_anneal_epochs: 10        # ramp from 0→10 in just 10 epochs (near-constant)

# ---- Action Space ----
action_space: "cartesian"  # "cartesian" (pos+rot6d+grasp=10D) or "joint" (7D)

# ---- Multi-Camera ----
camera_names: ["cam0", "wrist_right"]
camera_img_names:
  cam0: "rgb.png"
  wrist_right: "rgb_wrist_right.png"

# ---- GeoTokens (OFF) ----
centric_mode: "ego_centric"
max_state_tokens: 8
geo_token_dim: 10
max_objects: 4

# ---- Training ----
epochs: 400
batch_size: 24
lr: 1.0e-4
weight_decay: 1.0e-2
warmup_steps: 500
use_ema: True
ema_decay: 0.999
use_amp: True
num_workers: 4
seed: 42

# ---- Loss Weights ----
w_pos: 5.0
w_rot: 1.0
w_g: 5.0         # Increased: grasp was only 2.5% of gradient budget at w_g=2.0

# ---- Augmentation ----
augment: True

# ---- Eval & Logging ----
eval_every: 10
save_every: 50
log_every: 10
