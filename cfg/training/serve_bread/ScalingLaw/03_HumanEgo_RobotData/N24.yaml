# ============================================
# ACT — Teleop N=3 (ego-centric)
# ============================================

# ---- Data ----
pred_horizon: 50
image_size: [240, 320]
img_name: "rgb.png"
single_hand_side: "right"
hand_tracking_method: "aria_mps"
data_sources:
  teleop: 3
eval_source: "teleop"

# ---- Model ----
d_model: 256
nhead: 8
num_encoder_layers: 4
num_decoder_layers: 7
dim_feedforward: 2048
dropout: 0.1
action_dim: 10
latent_dim: 32
proprio_dim: 10

# ---- KL Annealing ----
kl_weight_max: 10.0
kl_anneal_epochs: 100

# ---- Action Space ----
action_space: "cartesian"  # "cartesian" (pos+rot6d+grasp=10D) or "joint" (7D)

# ---- Multi-Camera ----
camera_names: ["cam0", "wrist_right"]
camera_img_names:
  cam0: "rgb.png"
  wrist_right: "rgb_wrist_right.png"

# ---- GeoTokens (OFF) ----
centric_mode: "ego_centric"
max_state_tokens: 8
geo_token_dim: 10
max_objects: 4

# ---- Training ----
epochs: 400
batch_size: 24
lr: 1.0e-4
weight_decay: 1.0e-2
warmup_steps: 500
use_ema: True
ema_decay: 0.999
use_amp: True
num_workers: 4
seed: 42

# ---- Loss Weights ----
w_pos: 5.0
w_rot: 1.0
w_g: 10.0
w_done: 0.2

# ---- Augmentation ----
augment: True

# ---- Eval & Logging ----
eval_every: 10
save_every: 50
log_every: 10
