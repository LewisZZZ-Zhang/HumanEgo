# ============================================
# PointPolicy Baseline — ObjectCentric (GeoTokens)
# ============================================
# Same as PointPolicy but with GeoToken conditioning
# instead of history-concatenated 3D keypoints.

# ---- Centric Mode ----
centric_mode: "object_centric"
frame_mode: "camera_frame"
max_state_tokens: 8

# ---- Data ----
pred_horizon: 50
history_len: 10
max_obj_points_per_obj: 8
max_total_points: 8       # = max_state_tokens (GeoToken slots)
single_hand_side: "right"
hand_tracking_method: "aria_mps"
data_sources:
  aria: 60
eval_source: "aria"

# ---- Model ----
point_dim: 20              # TOKEN_DIM_SINGLE_HAND
hidden_dim: 256
n_layer: 4
n_head: 2
block_size: 8              # = max_state_tokens
dropout: 0.1
action_dim: 10
sigma: 0.1

# ---- Training ----
epochs: 400
batch_size: 32
lr: 1.0e-4
weight_decay: 1.0e-2
warmup_steps: 200
use_ema: True
ema_decay: 0.999
use_amp: True
num_workers: 4
seed: 42


# ---- Loss Weights ----
w_pos: 3.0
w_rot: 1.0
w_g: 1.0
w_done: 5.0

# ---- Augmentation ----
augment: True
aug_rot_deg: 30.0
aug_trans_m: 0.05

# ---- Eval & Logging ----
eval_every: 10
save_every: 50
log_every: 10
