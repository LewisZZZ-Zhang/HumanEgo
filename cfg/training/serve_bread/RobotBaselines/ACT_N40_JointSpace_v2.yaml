# ============================================
# ACT — Teleop N=40 Joint Space (v2: anti-overfit)
# ============================================
# Changes vs v1:
#   - num_decoder_layers: 7 → 1 (match original ACT paper)
#   - dropout: 0.1 → 0.2
#   - Strong image augmentation (crop, color jitter, noise, erasing)
#   - epochs: 400 → 300 (best model was at ~60 in v1)

# ---- Data ----
pred_horizon: 50
image_size: [240, 320]
img_name: "rgb.png"
single_hand_side: "right"
hand_tracking_method: "aria_mps"
data_sources:
  teleop: 40
eval_source: "teleop"

# ---- Model ----
d_model: 256
nhead: 8
num_encoder_layers: 4
num_decoder_layers: 1       # Original ACT paper uses 1 (not 7!)
dim_feedforward: 2048
dropout: 0.2                # Increased from 0.1 for small dataset
latent_dim: 32

# ---- Action Space ----
action_space: "joint"
action_dim: 7
proprio_dim: 7

# ---- KL Schedule ----
kl_weight_max: 10.0
kl_anneal_epochs: 10

# ---- Multi-Camera ----
camera_names: ["cam0", "wrist_right"]
camera_img_names:
  cam0: "rgb.png"
  wrist_right: "rgb_wrist_right.png"

# ---- GeoTokens (OFF) ----
centric_mode: "ego_centric"
max_state_tokens: 8
geo_token_dim: 10
max_objects: 4

# ---- Training ----
epochs: 300
batch_size: 24
lr: 1.0e-4
weight_decay: 1.0e-2
warmup_steps: 500
use_ema: True
ema_decay: 0.9995           # Slightly slower EMA for small dataset
use_amp: True
num_workers: 4
seed: 42

# ---- Loss Weights ----
w_pos: 5.0

# ---- Augmentation ----
augment: True

# ---- Eval & Logging ----
eval_every: 10
save_every: 50
log_every: 10
