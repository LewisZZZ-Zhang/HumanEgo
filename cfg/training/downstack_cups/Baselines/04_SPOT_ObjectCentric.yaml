# ============================================
# SPOT Baseline — ObjectCentric (GeoTokens)
# ============================================
# Same as SPOT but with flattened GeoTokens as
# conditioning instead of hand+object pose vector.

# ---- Centric Mode ----
centric_mode: "object_centric"
frame_mode: "camera_frame"
max_state_tokens: 8

# ---- Data ----
pred_horizon: 50
max_objects: 4
single_hand_side: "right"
hand_tracking_method: "aria_mps"
data_sources:
  aria: 60
eval_source: "aria"

# ---- Model ----
# cond_input_dim is computed automatically: max_state_tokens * 20 = 160
cond_input_dim: 160
pose_feat_dim: 64
action_dim: 10
diffusion_step_emb_dim: 128
down_dims: [128, 256, 384]
kernel_size: 5
n_groups: 8
num_train_timesteps: 100
num_inference_timesteps: 10

# ---- Training ----
epochs: 400
batch_size: 32
lr: 1.0e-4
weight_decay: 1.0e-2
warmup_steps: 500
use_ema: True
ema_decay: 0.999
use_amp: True
num_workers: 4
seed: 42


# ---- Loss Weights ----
w_pos: 3.0
w_rot: 1.0
w_g: 0.1
w_done: 5.0

# ---- Augmentation ----
augment: True
aug_pos_std: 0.005
aug_rot_std: 0.01

# ---- Eval & Logging ----
eval_every: 10
save_every: 50
log_every: 10
