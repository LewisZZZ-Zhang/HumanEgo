# ============================================
# EgoZero Baseline
# ============================================
# Simple BC with point-based transformer encoder.
# No image input — pure 3D keypoint conditioning.

# ---- Data ----
pred_horizon: 50
max_obj_points_per_obj: 8
max_total_points: 20
action_mode: "absolute"
single_hand_side: "right"
hand_tracking_method: "aria_mps"
data_sources:
  aria: 60
eval_source: "aria"

# ---- Model ----
point_dim: 3
hidden_dim: 512
n_layer: 4
n_head: 2
block_size: 20
dropout: 0.1
action_dim: 10
sigma: 0.1

# ---- Training ----
epochs: 400
batch_size: 32
lr: 1.0e-4
weight_decay: 1.0e-2
warmup_steps: 200
use_ema: True
ema_decay: 0.999
use_amp: True
num_workers: 4
seed: 42


# ---- Loss Weights ----
w_pos: 3.0
w_rot: 1.0
w_g: 1.0
w_done: 5.0

# ---- Augmentation ----
augment: True
aug_rot_deg: 30.0
aug_trans_m: 0.05

# ---- Eval & Logging ----
eval_every: 10
save_every: 50
log_every: 10
